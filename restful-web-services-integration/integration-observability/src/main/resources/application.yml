server:
  port: 8081

ibm:
  mq:
    host: localhost
    port: 1414
    queue-manager: QM1
    channel: DEV.APP.SVRCONN
    username: app
    password: app123!

camel:
  metrics:
    enable-route-policy: true
    enable-message-history: true
    enable-exchange-event-notifier: true

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - metrics
          - prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: integration-observability

  tracing:
    enabled: true
    propagation:
      type: w3c
    sampling:
      probability: 1.0

  observations:
    enabled: true
    web:
      enabled: true
    http:
      server:
        enabled: true

  health:
    jms:
      enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false