name: Restful Web Services CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 23
          distribution: temurin
          cache: maven

      - name: Build and test
        run: ./mvnw clean verify

      - name: Update PATCH version
        if: github.event_name == 'push'
        run: |
          CURRENT_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)

          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"

          echo "Updating version: $CURRENT_VERSION -> $NEW_VERSION"

          ./mvnw versions:set \
            -DnewVersion=$NEW_VERSION \
            -DgenerateBackupPoms=false

      - name: Commit and Tag
        if: github.event_name == 'push'
        run: |
          NEW_VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)

          git config user.name "teb-github-ci-actions"
          git config user.email "teb-github-ci-actions@users.noreply.github.com"

          git add .
          git commit -m "ci: version update to $NEW_VERSION" || exit 0

          git tag "v$NEW_VERSION"

          git push
          git push origin "v$NEW_VERSION"