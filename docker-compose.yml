services:
  postgres:
    image: postgres:16
    container_name: shared-postgres-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: cache-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: