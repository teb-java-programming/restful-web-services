spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/messaging_event_advanced_db?connectTimeout=10&socketTimeout=10
    username: app_user
    password: app_secure_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  sql:
    init:
      mode: never

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: messaging-event-advanced-group
      auto-offset-reset: earliest
#      enable-auto-commit: false
#      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
#      value-deserializer: org.springframework.kafka.support.serializer.JacksonJsonDeserializer
      properties:
        spring.json.trusted.packages: "com.teb.practice.*"
#        spring.json.value.default.type: com.teb.practice.events.EventEnvelope
#        spring.json.add.type.headers: false

#    producer:
#      key-serializer: org.apache.kafka.common.serialization.StringSerializer
#      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
#      properties:
#        spring.json.add.type.headers: false
#
    streams:
      application-id: messaging-event-advanced-streams
      auto-startup: false
#      properties:
#        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
#        default.value.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
#
#    listener:
#      concurrency: 4

#logging:
#  level:
#    org.apache.kafka: WARN
#    org.apache.kafka.streams: WARN

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false